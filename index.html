<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EMC SYLLABUS</title>
<style>
:root {
  --bg:#f3f7fb; --card:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#d9e2ef;
  --brand:#0f766e; --brand2:#0d9488; --soft:#eef2f7; --input:#ffffff;
  --good:#008236; --bad:#b42318; --chip:#e6fffb; --mark:#fde68a; --shadow:0 18px 45px rgba(15,23,42,.09);
}
body.dark {
  --bg:#08111f; --card:#111c2e; --ink:#ecfdf5; --muted:#a8b3c7; --line:#27364c;
  --brand:#5eead4; --brand2:#14b8a6; --soft:#182539; --input:#0f1a2b;
  --good:#86efac; --bad:#fca5a5; --chip:#13333b; --mark:#a16207; --shadow:0 20px 55px rgba(0,0,0,.35);
}
* { box-sizing:border-box; }
body { margin:0; font-family:Inter,ui-sans-serif,system-ui,-apple-system,Segoe UI,Arial,sans-serif; background:var(--bg); color:var(--ink); }
header { max-width:1220px; margin:auto; padding:26px 24px 18px; }
.eyebrow { color:var(--brand); font-size:13px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
h1 { margin:8px 0 10px; font-size:clamp(30px,5vw,52px); line-height:1.02; }
.lead { max-width:880px; margin:0; color:var(--muted); font-size:17px; line-height:1.55; }
.toolbar { max-width:1220px; margin:8px auto 22px; padding:0 24px; display:grid; grid-template-columns:1fr 190px 210px 170px; gap:12px; }
.toolbar input,.toolbar select,.toolbar button { border:1px solid var(--line); background:var(--input); color:var(--ink); border-radius:14px; padding:12px 14px; font:inherit; box-shadow:0 4px 16px rgba(15,23,42,.04); }
.toolbar button { background:var(--brand); color:white; border:0; font-weight:800; cursor:pointer; }
.wrap { max-width:1220px; margin:0 auto 52px; padding:0 24px; display:grid; grid-template-columns:300px 1fr; gap:22px; }
.panel,.card { background:var(--card); border:1px solid var(--line); border-radius:24px; box-shadow:var(--shadow); }
.panel { padding:24px; align-self:start; position:sticky; top:16px; }
.dashboard-title { display:flex; align-items:center; justify-content:space-between; gap:10px; margin:0 0 14px; }
.dashboard-title h2 { margin:0; font-size:26px; }
.theme-toggle { display:inline-flex; align-items:center; gap:8px; border:1px solid var(--line); background:var(--input); color:var(--ink); border-radius:999px; padding:8px 10px; font-weight:800; font-size:12px; cursor:pointer; white-space:nowrap; }
.theme-toggle .dot { width:13px; height:13px; border-radius:999px; display:inline-block; background:var(--brand2); box-shadow:0 0 0 3px rgba(20,184,166,.16); }
.progress { height:14px; border-radius:99px; background:var(--soft); overflow:hidden; margin:14px 0 12px; }
.progress span { display:block; height:100%; background:linear-gradient(90deg,var(--brand2),#22c55e); width:0; transition:width .2s ease; }
.small { color:var(--muted); font-size:14px; line-height:1.45; }
.stat { display:flex; justify-content:space-between; gap:12px; padding:13px 0; border-bottom:1px solid var(--line); }
.stat b { font-size:28px; }
.area-list { display:flex; flex-wrap:wrap; gap:9px; margin-top:16px; }
.area-chip { border:1px solid var(--line); background:var(--input); color:var(--muted); border-radius:999px; padding:9px 13px; font:inherit; font-size:14px; cursor:pointer; user-select:none; transition:.15s ease; }
.area-chip:hover,.area-chip.active { background:var(--brand2); border-color:var(--brand2); color:#fff; transform:translateY(-1px); }
.area-chip:focus { outline:3px solid rgba(20,184,166,.35); outline-offset:2px; }
.grid { display:grid; gap:14px; }
.card { padding:18px 22px; overflow:hidden; }
.course-title { font-weight:900; font-size:22px; letter-spacing:-.02em; }
.meta { display:flex; flex-wrap:wrap; gap:8px; margin:12px 0; }
.badge { display:inline-flex; align-items:center; border-radius:999px; padding:6px 10px; font-size:13px; font-weight:800; }
.complete { background:#dcfce7; color:#166534; }
.incomplete { background:#fee2e2; color:#991b1b; }
body.dark .complete { background:#063d23; color:#86efac; }
body.dark .incomplete { background:#4a1111; color:#fecaca; }
.area { background:var(--chip); color:var(--brand); }
.term { background:var(--soft); color:var(--muted); }
.program-badge { background:#fff7ed; color:#9a3412; border:1px solid rgba(154,52,18,.15); }
body.dark .program-badge { background:#3b2412; color:#fed7aa; border-color:#7c2d12; }
a { color:var(--brand); font-weight:800; text-decoration:none; }
a:hover { text-decoration:underline; }
.actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
.actions button { border:1px solid var(--line); border-radius:13px; background:var(--input); color:var(--ink); padding:10px 14px; font-weight:800; cursor:pointer; }
.actions .primary { background:var(--brand2); color:white; border-color:var(--brand2); }
.actions button:disabled { opacity:.45; cursor:not-allowed; }
.checkrow { display:flex; align-items:center; gap:10px; margin-top:14px; padding-top:14px; border-top:1px dashed var(--line); color:var(--muted); }
.checkrow input { width:20px; height:20px; }
.weeks { display:none; margin-top:14px; border-top:1px solid var(--line); padding-top:10px; }
.weeks.open { display:block; }
.week { display:grid; grid-template-columns:120px 1fr; gap:10px; padding:11px 0; border-bottom:1px solid var(--line); }
.week:last-child { border-bottom:0; }
.week b { color:var(--brand); }
mark { background:var(--mark); color:var(--ink); border-radius:4px; padding:0 2px; }
.empty { padding:40px; text-align:center; color:var(--muted); }
footer { max-width:1220px; margin:0 auto 30px; padding:0 24px; color:var(--muted); font-size:13px; }

.flowchart-card { padding:16px; }
.flowchart-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.flowchart-toolbar h2 { margin:0; font-size:24px; }
.zoom-controls { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.zoom-controls button { border:1px solid var(--line); border-radius:12px; background:var(--input); color:var(--ink); padding:9px 12px; font-weight:900; cursor:pointer; }
.zoom-controls input[type=range] { width:180px; accent-color:var(--brand2); }
.flowchart-stage { height:min(72vh,760px); overflow:auto; border:1px solid var(--line); border-radius:18px; background:#fff; cursor:grab; }
.flowchart-stage.dragging { cursor:grabbing; }
.flowchart-zoom-image { display:block; width:100%; max-width:none; height:auto; transform-origin:top left; border-radius:12px; user-select:none; -webkit-user-drag:none; }
body.dark .flowchart-stage { background:#f8fafc; }

.flowchart-backdrop { position:fixed; inset:0; background:rgba(15,23,42,.55); display:none; align-items:center; justify-content:center; padding:22px; z-index:50; }
.flowchart-backdrop.open { display:flex; }
.flowchart-modal { width:min(1080px,100%); max-height:88vh; overflow:auto; background:var(--card); border:1px solid var(--line); border-radius:26px; box-shadow:0 28px 80px rgba(0,0,0,.28); padding:22px; }
.flowchart-head { display:flex; align-items:flex-start; justify-content:space-between; gap:14px; margin-bottom:14px; }
.flowchart-head h2 { margin:0; font-size:28px; }
.flowchart-close { border:1px solid var(--line); background:var(--input); color:var(--ink); border-radius:999px; padding:9px 13px; font-weight:900; cursor:pointer; }
.flowchart-grid { display:grid; gap:14px; }
.flowchart-image-wrap { background:var(--soft); border:1px solid var(--line); border-radius:20px; padding:12px; }
.flowchart-image { display:block; width:100%; height:auto; border-radius:14px; }
.flow-row { display:grid; grid-template-columns:150px 1fr; gap:12px; align-items:start; }
.flow-label { position:sticky; left:0; color:var(--brand); font-weight:900; padding:12px 0; }
.flow-nodes { display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
.flow-node { border:1px solid var(--line); background:var(--input); color:var(--ink); border-radius:16px; padding:10px 12px; min-width:150px; box-shadow:0 7px 18px rgba(15,23,42,.06); }
.flow-node b { display:block; font-size:14px; }
.flow-node span { color:var(--muted); display:block; font-size:12px; margin-top:3px; }
.flow-node.complete-node { border-color:rgba(22,101,52,.35); }
.flow-node.incomplete-node { border-color:rgba(153,27,27,.35); }
.flow-arrow { color:var(--muted); font-weight:900; align-self:center; }
@media(max-width:700px) { .flow-row { grid-template-columns:1fr; } .flow-label { position:static; } }

@media(max-width:900px) { .toolbar { grid-template-columns:1fr; } .wrap { grid-template-columns:1fr; } .panel { position:static; } }
@media(max-width:560px) { .dashboard-title { align-items:flex-start; flex-direction:column; } .week { grid-template-columns:1fr; } }
</style>
</head>

le setup, and shortcut use."}, {"week": "Week 2", "formative": "Object Creation, Transforms, Workspaces and Collections", "description": "Students create simple objects, apply transforms, organize collections, and submit a clean blockout file."}, {"week": "Week 3", "formative": "Object Mode Operations: Shading, Duplication and Parenting", "description": "Students manage object relationships, duplicate assets efficiently, and organize simple prop layouts."}, {"week": "Week 4", "formative": "Edit Mode: Selection Tools and Core Modeling", "description": "Students use vertices, edges, faces, extrusion, bevels, and loop cuts to build clean hard-surface props."}, {"week": "Week 5", "formative": "Advanced Mesh Editing and Topology Functions", "description": "Students improve mesh quality using topology cleanup, normals, knife, merge, and slide tools."}, {"week": "Week 6", "formative": "Modifiers and Add-ons", "description": "Students use non-destructive tools such as mirror, subdivision, array, boolean, and extra objects to improve workflow."}, {"week": "Week 7", "formative": "Midterms: Recreate Mechanics", "description": "Students complete a midterm practical output demonstrating their Blender modeling and workflow skills."}, {"week": "Week 8-9", "formative": "Creating Common Props", "description": "Students produce game-ready modular props such as crates, barrels, gravestones, fences, treasure chests, furniture, or houses."}, {"week": "Week 10-11", "formative": "UV Mapping, Texturing and Materials", "description": "Students unwrap props, apply textures and materials, check distortion, and prepare assets for game use."}, {"week": "Week 12", "formative": "Animation for Game Assets", "description": "Students create a simple animated prop and validate the exported asset in Unity."}, {"week": "Week 12-13", "formative": "Finals: Themed Prop Set", "description": "Students complete and present a portfolio-ready prop set aligned with the given course theme."}]}, "syllabus-url": "  "isComplete": true, "courseDetail": null, "syllabus-url": "https://docs.google.com/document/d/1ENISBJL-bj5DmtmoGx9WTpwWm_hhBm5RdHNeY-4dvHg/edit?usp=drive_link"}], "courses": {"emc-201": {"sheet": "EMC 201", "code": "EMC 201", "title": "EMC 201 - Game Programming 1", "prerequisites": "EMC 102 or basic programming fundamentals", "description": "EMC201 course will teach you about game engines, source control, and computer languages that used in game\nengines by using an IDE(integrated development environment), in addition to this you will learn how to apply art and animation assets that are used\nin making games.", "weeks": [{"week": "Week 1–2", "formative": "Basics in Unity, GitHub, Visual Studio", "description": "Students are introduced to the Unity interface, basic project setup, version control using GitHub, and coding in Visual Studio."}, {"week": "Week 3–4", "formative": "Introduction to C#, MonoBehaviour and Unity Components", "description": "Students learn basic C# scripting, how MonoBehaviour works, and how Unity components are used to control game objects."}, {"week": "Week 5", "formative": "Coroutines, Invoke, async/await, Time", "description": "Students explore different ways to manage timed actions, delays, and asynchronous behavior in Unity."}, {"week": "Week 6", "formative": "UI, TMPRO, UI Scripting", "description": "Students create game interfaces using Unity UI and TextMeshPro, and learn how to control UI elements through scripts."}, {"week": "Week 7", "formative": "Midterms", "description": ""}, {"week": "Week 8", "formative": "Prefab, Spawning, Movement, Rigidbody", "description": "Students learn how to create reusable prefabs, spawn objects, move game objects, and apply physics using Rigidbody."}, {"week": "Week 9", "formative": "Triggers, Colliders, Scene Management, Build Executable", "description": "Students work with collision detection, trigger events, scene transitions, and exporting their Unity project as a playable build."}, {"week": "Week 10–11", "formative": "3D/2D Animation Scripting, Animation Parameters", "description": "Students control 2D and 3D animations through scripts and use animation parameters to manage character or object behavior."}, {"week": "Week 12–13", "formative": "Finals", "description": ""}]}, "emc-202": {"sheet": "EMC 202", "code": "EMC 202", "title": "EMC 202 - Game Programming 2", "prerequisites": "EMC 201", "description": "EMC202 course will teach you about C# behavior and MonoBehaviour lifecycle methods; solid OOP design (inheritance, abstract classes, interfaces); math for 3D motion (vectors and quaternions); gameplay data and state (serialization, Lists/Dictionaries); and Unity systems like Cinemachine, ScriptableObjects, physics colliders, and blend-tree animation. You’ll wire C# to 3D characters and UI/UX, integrate 2D/3D assets, and manage projects with Git.", "weeks": [{"week": "Week 1", "formative": "Singleton Pattern and Factory Pattern", "description": "Introduces common design patterns used to manage object creation and shared game systems in Unity."}, {"week": "Week 2", "formative": "Vectors, Quaternions, Rotations", "description": "Covers movement direction, object positioning, and rotation handling using vectors and quaternions."}, {"week": "Week 3", "formative": "Inheritance, Methods", "description": "Explains how classes can inherit behavior and how methods are used to organize reusable code."}, {"week": "Week 4", "formative": "Abstract and Interface", "description": "Introduces abstraction and interfaces for creating flexible and structured object-oriented programs."}, {"week": "Week 5", "formative": "Classes, Serializable", "description": "Discusses class creation and how serialization allows custom data to be shown and edited in the Unity Inspector."}, {"week": "Week 6", "formative": "Lists, Arrays and Dictionaries", "description": "Covers collection types used to store, manage, and access multiple values or objects in scripts."}, {"week": "Week 7", "formative": "Midterms: Recreate Mechanics", "description": "Students recreate selected game mechanics to demonstrate their understanding of scripting and Unity systems."}, {"week": "Week 8", "formative": "Lists, Arrays and Dictionaries", "description": "Reinforces the use of collections through practical examples and game-related scripting activities."}, {"week": "Week 9", "formative": "Scriptable Objects", "description": "Introduces Scriptable Objects for storing reusable data and separating game data from logic."}, {"week": "Week 10–11", "formative": "Blendtree, Animation Events, Cinemachine", "description": "Covers advanced animation control, animation-triggered events, and camera systems using Cinemachine."}, {"week": "Week 12–13", "formative": "Finals", "description": "Students complete and present a final project applying advanced Unity scripting, animation, and system design concepts."}]}, "emc-205": {"sheet": "EMC 205", "code": "EMC 205", "title": "EMC 205 - Game Programming 3", "prerequisites": "EMC 202", "description": "EMC203 course sharpens students’ engineering practice by applying classic design patterns and presentation architectures to real \ngameplay systems. Through focused labs (Factory, Command, State, Flyweight, Observer) and UI architectures (MVP, MVVM), \nstudents learn to refactor for clarity, extensibility, and performance, culminating in a small, pattern-driven final project.", "weeks": [{"week": "Week 1 - 2", "formative": "Design Patterns", "description": "Reusable solutions to common software design problems that help make code organized, flexible, and easier to maintain."}, {"week": "Week 3", "formative": "Command Pattern", "description": "A pattern that turns actions or requests into objects, allowing commands to be stored, delayed, undone, or reused."}, {"week": "Week 4", "formative": "State Pattern", "description": "A pattern that allows an object to change its behavior depending on its current state."}, {"week": "Week 5 - 6", "formative": "MVP (Model View Presenter)", "description": "An architectural pattern that separates data, user interface, and presentation logic to make applications easier to manage and test."}, {"week": "Week 7", "formative": "Midterms: Recreate Mechanics", "description": "A practical assessment where students recreate specific game or software mechanics using the concepts learned."}, {"week": "Week 8–9", "formative": "Flyweight Pattern", "description": "A design pattern that reduces memory usage by sharing common data between many similar objects."}, {"week": "Week 10", "formative": "Observer Pattern", "description": "A pattern where one object notifies other objects automatically when its state changes."}, {"week": "Week 11", "formative": "MVVM (Model View ViewModel)", "description": "An architectural pattern that separates the user interface from the application logic using a ViewModel to manage data and behavior."}, {"week": "Week 12–13", "formative": "Finals: Create a Game Based on Theme", "description": "A final project where students design and develop a game based on a given theme while applying design patterns and architecture concepts."}]}, "emc-203": {"sheet": "EMC 203", "code": "EMC 203", "title": "EMC 203 - Applied Mathematics in Games", "prerequisites": "College algebra/trigonometry or equivalent", "description": "EMC203 reviews essential mathematical concepts and practical applications in game development, emphasizing mathematical models for mechanics, physics simulations, movement, and procedural generation.", "weeks": [{"week": "Week 1", "formative": "Importance of Mathematics in Game Development", "description": "Students review algebra fundamentals and discuss how mathematics supports game mechanics and systems."}, {"week": "Week 2", "formative": "The Math Library in C# and Unity", "description": "Students use C# and Unity math functions including rounding, truncating, ceilings, and floors."}, {"week": "Week 3", "formative": "Linear Equations", "description": "Students apply linear algebra, vectors, scalars, slope, and intercepts to create game mechanics such as trajectories."}, {"week": "Week 4", "formative": "Quaternions", "description": "Students learn quaternion representations and use them for accurate 3D rotations in Unity."}, {"week": "Week 5", "formative": "Geometry", "description": "Students apply geometric concepts such as angles, lines, and enemy vision to game mechanics."}, {"week": "Week 6", "formative": "Trigonometry", "description": "Students use right-triangle trigonometry, unit circle concepts, and trig functions for gameplay mechanics."}, {"week": "Week 7", "formative": "Midterms", "description": "Students complete a midterm output or assessment covering mathematical concepts for games."}, {"week": "Week 8-9", "formative": "Exponential and Logarithmic Functions", "description": "Students design mechanics that use growth, scaling, progression, or experience systems."}, {"week": "Week 10", "formative": "Collisions", "description": "Students implement collision detection and response techniques in Unity."}, {"week": "Week 11-12", "formative": "Procedural Generations", "description": "Students create procedurally generated content using randomness, fractals, terrain generation, or Perlin noise."}, {"week": "Week 13", "formative": "Finals: Math-Based Game Program", "description": "Students submit and present a project using concepts such as quaternions, Euler angles, linear algebra, vectors, splines, and lerps."}]}, "emc-204": {"sheet": "EMC 204", "code": "EMC 204", "title": "EMC 204 - Applied Game Physics", "prerequisites": "EMC 203", "description": "This course teaches the fundamentals of game physics and how they are applied in game development, leading to a game that uses physics as a main mechanic.", "weeks": [{"week": "Week 1", "formative": "Introduction to Applied Game Physics", "description": "Students identify common physics concepts in games and explain why physics is important to gameplay."}, {"week": "Week 2", "formative": "One-Dimensional Motion, Displacement, Time, Velocity and Acceleration", "description": "Students create a Unity activity that uses speed, distance, time, velocity, and acceleration."}, {"week": "Week 3", "formative": "Trajectory", "description": "Students implement and demonstrate trajectory-based movement in a simple Unity project."}, {"week": "Week 4", "formative": "Vectors and Displacement", "description": "Students use vectors, components, and displacement to create motion-based game mechanics."}, {"week": "Week 5", "formative": "Two- and Three-Dimensional Motion", "description": "Students apply displacement, velocity, and vector components in 2D and 3D space."}, {"week": "Week 6", "formative": "Unity Forces, Rigidbody, Gravity and Forces", "description": "Students create scenes using Rigidbody components, gravity, and force-based motion."}, {"week": "Week 7", "formative": "Midterms", "description": "Students demonstrate applied game physics concepts through a midterm practical output."}, {"week": "Week 8", "formative": "Joints,Hinge,Cloth", "description": "Students create Unity activities that showcase hinges, joints, and connected physics behavior."}, {"week": "Week 9", "formative": "Raycast,Collisions", "description": "Students learn Unity raycasts"}, {"week": "Week 10-11", "formative": "Gravitational Pull Forces and Acceleration", "description": "Students create Unity activities that showcase hinges, joints, and connected physics behavior."}, {"week": "Week 12-13", "formative": "Finals", "description": "Students submit and present a final game or activity that uses physics as a core mechanic."}]}, "emc-207": {"sheet": "EMC 207", "code": "EMC 207", "title": "EMC 207 - Artificial Intelligence in Games", "prerequisites": "EMC 202, EMC 203 recommended", "description": "EMC207 introduces core techniques in game artificial intelligence using Unity, including NavMesh navigation, finite state machines, behavior trees, and GOAP.", "weeks": [{"week": "Week 1", "formative": "NavMesh Basics", "description": "Students set up Unity NavMesh surfaces, agents, and basic pathfinding for NPC navigation."}, {"week": "Week 2", "formative": "NavMesh Links and Obstacles", "description": "Students create links, obstacles, blocked paths, and dynamic navigation behaviors."}, {"week": "Week 3", "formative": "Runtime NavMesh Surfaces and Procedural Navigation", "description": "Students update navigation at runtime and test navigation in procedural or changing environments."}, {"week": "Week 4", "formative": "Simulating Flying NPCs", "description": "Students create flying or drone-like NPC movement using navigation projection, steering, and target reacquisition."}, {"week": "Week 5-6", "formative": "State Machines (FSM) with NavMesh Actions", "description": "Students build FSM-based NPC behavior that coordinates states, navigation, animations, logs, and gizmos."}, {"week": "Week 7", "formative": "Midterm: FSM Combat or Stealth Prototype", "description": "Students complete a practical AI prototype using FSMs and navigation-based behaviors."}, {"week": "Week 8-9", "formative": "Behavior Trees", "description": "Students construct behavior tree scenarios with reusable actions and decision logic."}, {"week": "Week 10-11", "formative": "GOAP Planning and Decision Systems", "description": "Students implement goal-oriented planning or higher-level decision logic for AI agents."}, {"week": "Week 12-13", "formative": "Finals: AI-Driven Game Scenario", "description": "Students develop and present a themed game or playable scenario that integrates navigation and AI decision systems."}]}, "emc-103": {"sheet": "EMC 103", "code": "EMC 103", "title": "EMC 103 - Computer Graphics Programming", "prerequisites": "EMC 201, EMC 203", "description": "This course teaches students how to create visual effects and graphics based on video game industry standards using Unity tools\n such as renderer pipelines, particles, VFX Graph, Shader Graph, and HLSL.", "weeks": [{"week": "Week 1", "formative": "Unity Renderer Pipelines", "description": "Students learn the types and setup of Unity renderer pipelines used to control visual output."}, {"week": "Week 2", "formative": "Lighting and Volumes", "description": "Students modify lights and volume settings to enhance visual quality and atmosphere."}, {"week": "Week 3-4", "formative": "Unity Particle System", "description": "Students create visual effects using Unity Particle System tools and parameters."}, {"week": "Week 5-6", "formative": "Unity VFX Graph Package", "description": "Students create more advanced visual effects using Unity VFX Graph workflows."}, {"week": "Week 7", "formative": "Midterms: VFX Using Particle System and VFX Graph", "description": "Students demonstrate visual effects skills through a midterm output using particles and VFX Graph."}, {"week": "Week 8-9", "formative": "Unity Shader Graph Package", "description": "Students create shaders visually using Shader Graph and apply them to game assets."}, {"week": "Week 10-12", "formative": "HLSL Shader Code in Unity", "description": "Students write or modify HLSL shader code to create custom graphics effects."}, {"week": "Week 13", "formative": "Finals: Shader Graph and HLSL Output", "description": "Students submit a final shader output using Shader Graph and HLSL workflows."}]}, "emc-208": {"sheet": "EMC 208", "code": "EMC 208", "title": "EMC 208 - Advanced Game Design", "prerequisites": "EMC 102, EMC 107", "description": "This course teaches intermediate to advanced game design with game design frameworks, game pitching, and pitch deck creation.", "weeks": [{"week": "Week 1", "formative": "GDLC Recap", "description": "Students review the Game Development Life Cycle and connect it to advanced design planning."}, {"week": "Week 2", "formative": "GDD Recap", "description": "Students revisit the purpose, process, and structure of the Game Design Document."}, {"week": "Week 3", "formative": "Introduction to Game Design Frameworks", "description": "Students learn how game design frameworks support clearer design decisions and documentation."}, {"week": "Week 4", "formative": "MDA, FDD and DDE Frameworks", "description": "Students apply MDA, FDD, and DDE frameworks to analyze and improve a game design."}, {"week": "Week 5", "formative": "Player-Concentrated and Iterative Design", "description": "Students use player-focused and iterative methods to refine game systems and experience."}, {"week": "Week 6", "formative": "Elemental Tetrad Quad", "description": "Students apply the elemental tetrad to evaluate story, mechanics, aesthetics, and technology."}, {"week": "Week 7", "formative": "Midterms", "description": "Students demonstrate understanding of game design frameworks and their application to a game concept."}, {"week": "Week 8", "formative": "High Concept Document", "description": "Students prepare a high concept document that summarizes the core idea and direction of a game."}, {"week": "Week 9", "formative": "Game Pitch", "description": "Students develop and practice a game pitch for communicating a game concept effectively."}, {"week": "Week 10-12", "formative": "Pitch Deck Structures", "description": "Students build and refine a pitch deck that presents the game concept, audience, features, and value."}, {"week": "Week 13", "formative": "Finals", "description": "Students present the final pitch deck and advanced game design output."}]}, "emc-215": {"sheet": "EMC 215", "code": "EMC 215", "title": "EMC 215 - Game Production", "prerequisites": "EMC 107", "description": "EMC215 teaches game production processes and roles, including progress tracking, \nresources, manpower, deadlines, marketing, and post-release support.", "weeks": [{"week": "Week 1", "formative": "Game Ideas and Production Orientation", "description": "Students discuss the game development process and post initial game ideas aligned with the theme."}, {"week": "Week 2", "formative": "Pre-Production Planning and Team Roles", "description": "Students identify production roles and plan pre-production responsibilities for a game project."}, {"week": "Week 3", "formative": "Elevator Pitch and Production Timeline", "description": "Students prepare and present an elevator pitch and submit a production timeline."}, {"week": "Week 4", "formative": "Game Design Document and Target Milestones", "description": "Students create a Game Design Document and identify production milestones and targets."}, {"week": "Week 5", "formative": "Prototype Development", "description": "Students begin developing a prototype based on the planned design and production timeline."}, {"week": "Week 6", "formative": "Prototype Development", "description": "Students continue prototype development while tracking progress and production needs."}, {"week": "Week 7", "formative": "Midterms: Prototype", "description": "Students submit or present a prototype that demonstrates core gameplay and production progress."}, {"week": "Week 8", "formative": "Production", "description": "Students continue building the game and documenting progress based on production milestones."}, {"week": "Week 9", "formative": "Production", "description": "Students develop game features, assets, and systems while monitoring scope and deadlines."}, {"week": "Week 10", "formative": "Production", "description": "Students refine the game build and continue implementing planned features."}, {"week": "Week 11", "formative": "Production and QA Testing", "description": "Students test the game, identify issues, and improve the build through QA feedback."}, {"week": "Week 12", "formative": "Mock Presentation, Student CV and Portfolio", "description": "Students prepare a mock presentation and supporting career or portfolio materials."}, {"week": "Week 13", "formative": "Finals: Presentation", "description": "Students present the final game production output and explain the process used to complete it."}]}, "emc-102": {"sheet": "EMC 102", "code": "EMC 102", "title": "EMC 102 - Introduction to Game Design and Development", "prerequisites": "None", "description": "This course teaches the basics of the game design process, including game ideas, genres, loops, mechanics, and the creation of a Game Design Document.", "weeks": [{"week": "Week 1", "formative": "Game Development Life Cycle (GDLC)", "description": "Students are introduced to the game development process and learn how GDLC guides the creation of a game from concept to completion."}, {"week": "Week 2", "formative": "Roles and Positions in Game Development", "description": "Students explore the different roles in a game development team and understand the responsibilities of a game designer."}, {"week": "Week 3", "formative": "Game Mechanics and Hooks", "description": "Students identify game mechanics, hooks, and unique selling points, then connect them to a game idea."}, {"week": "Week 4", "formative": "Gameplay and Game Loops", "description": "Students learn how gameplay loops and goals structure player actions and progression in a game."}, {"week": "Week 5", "formative": "Feedback Loops", "description": "Students examine positive and negative feedback loops and apply them to balance rewards and player experience."}, {"week": "Week 6", "formative": "Game Economy", "description": "Students study basic game economy systems and plan how resources, rewards, and progression can be balanced."}, {"week": "Week 7", "formative": "Midterms: Game Idea Using Design Fundamentals", "description": "Students create a game idea using hooks, mechanics, gameplay loops, feedback loops, and the given theme."}, {"week": "Week 8", "formative": "Types of Prototyping", "description": "Students learn the purpose and types of prototyping used to test and refine game concepts."}, {"week": "Week 9", "formative": "Game Design Document and Game Design Bible", "description": "Students learn the purpose, structure, and differences between a GDD and a Game Design Bible."}, {"week": "Week 10", "formative": "Flowcharts in Game Development", "description": "Students create flowcharts to visualize game loops, processes, and player interactions."}, {"week": "Week 11-12", "formative": "Game Design Document Structure", "description": "Students develop the sections of a Game Design Document through a step-by-step design process."}, {"week": "Week 13", "formative": "Finals: Game Design Document", "description": "Students submit a complete Game Design Document based on their midterm game idea and the course theme."}]}, "emc-104": {"sheet": "EMC 104", "code": "EMC 104", "title": "EMC 104 - Usability, HCI, UI Design", "prerequisites": "EMC 102 recommended", "description": "This course will teach you how to properly design UI in games by its usability, blending and tweening, this ensures a balance gameplay and blending UI on the games theme", "weeks": [{"week": "Week", "formative": "Formative", "description": "Short Description"}, {"week": "Week 1", "formative": "Game development process, main roles in production, and the role of a Game Designer", "description": "Students are introduced to the game development pipeline, production roles, and the responsibilities of a game designer."}, {"week": "Week 2", "formative": "Game analysis, critiquing and analyzing game design", "description": "Students analyze existing games using design frameworks and identify player types, game goals, and design strengths or weaknesses."}, {"week": "Week 3", "formative": "Formal elements of game design and document critique sessions", "description": "Students revisit game design documents, critique peer work, and begin refining their own design documentation."}, {"week": "Week 4", "formative": "Dramatic elements and ludonarrative consistency", "description": "Students explore narrative flow, dramatic structure, and how story elements should support gameplay experience."}, {"week": "Week 5", "formative": "Mechanics, Dynamics, Aesthetics and game system dynamics", "description": "Students study the MDA framework and create system diagrams that show mechanics, feedback loops, and player experience."}, {"week": "Week 6", "formative": "Game conceptualization and writing game concept briefs", "description": "Students develop game concepts and prepare draft documentation for their midterm pitch."}, {"week": "Week 7", "formative": "Midterms: Game concept and design document presentation", "description": "Students submit and present their midterm game concept and design document."}, {"week": "Week 8", "formative": "Playtesting fundamentals and test case documentation", "description": "Students learn how to plan playtesting sessions, prepare checklists, and document test cases for design improvement."}, {"week": "Week 9–12", "formative": "Game feel, prototype iteration, polish, UX, lerp, slerp, camera shake, SFX, and VFX", "description": "Students improve their prototypes through weekly feedback, polishing gameplay feel, visuals, audio, and user experience."}, {"week": "Week 13", "formative": "Finals: Final game prototype and documentation", "description": "Students submit their final game prototype and complete documentation, demonstrating iteration, design refinement, and production readiness."}, {"week": "Week 12", "formative": "Prototyping Components and Transitions", "description": "Students refine their UI prototypes by improving component behavior, transitions, and usability."}, {"week": "Week 13", "formative": "Finals: Setup a Main menu and Pause menu", "description": "Students complete a final UI output by designing and implementing a main menu and pause menu system."}]}, "emc-106": {"sheet": "EMC 106", "code": "EMC 106", "title": "EMC 106 - Scriptwriting and Storyboard Design", "prerequisites": "EMC 102", "description": "This course guides students through the fundamentals of scriptwriting and storyboard design for game development, emphasizing narrative flow, gameplay sequences, and interactive storytelling.", "weeks  asset planning materials."}, {"week": "Week 12", "formative": "Peer Review and Refinement", "description": "Students revise storyboards and scripts based on critique, iteration, and feedback integration."}, {"week": "Week 13", "formative": "Finals", "description": "Students submit and present the final scriptwriting and storyboard output for a game concept."}]}, "emc-107": {"sheet": "EMC 107", "code": "EMC 107", "title": "EMC 107 - Design and Production Process", "prerequisites": "EMC 102, EMC 106 recommended", "description": "EMC107 introduces students to the foundational processes of game design and production. \n Through critique, iteration, and production exercises, students will learn how to design for player experiences, develop cohesive design documentation, and conduct effective playtesting to refine their projects.", "weeks": [{"week": "Week 1", "formative": "Game development process, main roles in production, and the role of a Game Designer", "description": "Students are introduced to the game development pipeline, production roles, and the responsibilities of a game designer."}, {"week": "Week 2", "formative": "Game analysis, critiquing and analyzing game design", "description": "Students analyze existing games using design frameworks and identify player types, game goals, and design strengths or weaknesses."}, {"week": "Week 3", "formative": "Formal elements of game design and document critique sessions", "description": "Students revisit game design documents, critique peer work, and begin refining their own design documentation."}, {"week": "Week 4", "formative": "Dramatic elements and ludonarrative consistency", "description": "Students explore narrative flow, dramatic structure, and how story elements should support gameplay experience."}, {"week": "Week 5", "formative": "Mechanics, Dynamics, Aesthetics and game system dynamics", "description": "Students study the MDA framework and create system diagrams that show mechanics, feedback loops, and player experience."}, {"week": "Week 6", "formative": "Game conceptualization and writing game concept briefs", "description": "Students develop game concepts and prepare draft documentation for their midterm pitch."}, {"week": "Week 7", "formative": "Midterms: Game concept and design document presentation", "description": "Students submit and present their midterm game concept and design document."}, {"week": "Week 8", "formative": "Playtesting fundamentals and test case documentation", "description": "Students learn how to plan playtesting sessions, prepare checklists, and document test cases for design improvement."}, {"week": "Week 9–12", "formative": "Game feel, prototype iteration, polish, UX, lerp, slerp, camera shake, SFX, and VFX", "description": "Students improve their prototypes through weekly feedback, polishing gameplay feel, visuals, audio, and user experience."}, {"week": "Week 13", "formative": "Finals: Final game prototype and documentation", "description": "Students submit their final game prototype and complete documentation, demonstrating iteration, design refinement, and production readiness."}]}, "emc-108": {"sheet": "EMC 108", "code": "EMC 108", "title": "EMC 108 - Introduction to 3D Modelling", "prerequisites": "None", "description": "EMC108 trains students in Blender fundamentals for game asset production, including interface navigation, modeling tools, modifiers, topology, UV mapping, materials, and basic prop animation.", "weeks": [{"week": "Week 1", "formative": "Blender Interface, Navigation and Basic Controls", "description": "Students learn the Blender workspace, viewport navigation, basic transforms, file setup, and shortcut use."}, {"week": "Week 2", "formative": "Object Creation, Transforms, Workspaces and Collections", "description": "Students create simple objects, apply transforms, organize collections, and submit a clean blockout file."}, {"week": "Week 3", "formative": "Object Mode Operations: Shading, Duplication and Parenting", "description": "Students manage object relationships, duplicate assets efficiently, and organize simple prop layouts."}, {"week": "Week 4", "formative": "Edit Mode: Selection Tools and Core Modeling", "description": "Students use vertices, edges, faces, extrusion, bevels, and loop cuts to build clean hard-surface props."}, {"week": "Week 5", "formative": "Advanced Mesh Editing and Topology Functions", "description": "Students improve mesh quality using topology cleanup, normals, knife, merge, and slide tools."}, {"week": "Week 6", "formative": "Modifiers and Add-ons", "description": "Students use non-destructive tools such as mirror, subdivision, array, boolean, and extra objects to improve workflow."}, {"week": "Week 7", "formative": "Midterms: Recreate Mechanics", "description": "Students complete a midterm practical output demonstrating their Blender modeling and workflow skills."}, {"week": "Week 8-9", "formative": "Creating Common Props", "description": "Students produce game-ready modular props such as crates, barrels, gravestones, fences, treasure chests, furniture, or houses."}, {"week": "Week 10-11", "formative": "UV Mapping, Texturing and Materials", "description": "Students unwrap props, apply textures and materials, check distortion, and prepare assets for game use."}, {"week": "Week 12", "formative": "Animation for Game Assets", "description": "Students create a simple animated prop and validate the exported asset in Unity."}, {"week": "Week 12-13", "formative": "Finals: Themed Prop Set", "description": "Students complete and present a portfolio-ready prop set aligned with the given course theme."}]}}}</script>

  function esc(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));
  }
  function norm(value) { return String(value ?? '').toLowerCase().replace(/[^a-z0-9]+/g,' ').replace(/\s+/g,' ').trim(); }
  function collect(value) {
    if (value == null) return '';
    if (['string','number','boolean'].includes(typeof value)) return String(value);
    if (Array.isArray(value)) return value.map(collect).join(' ');
    if (typeof value === 'object') return Object.values(value).map(collect).join(' ');
    return '';
  }
  function unique(list) { return [...new Set(list.filter(Boolean))].sort(); }
  function areaOf(item) { return item['curriculum-area'] || ''; }
  function statusOf(item) {
    const s = String(item.status || '').toLowerCase();
    if (s.includes('incomplete')) return 'incomplete';
    if (s.includes('complete')) return 'complete';
    return item.isComplete ? 'complete' : 'incomplete';
  }
  const STOP = new Set(['in','and','the','of','for','to','a','an','with','on','or']);
  function queryTokens() {
    const tokens = norm(el.search.value).split(' ').filter(Boolean);
    const important = tokens.filter(t => !STOP.has(t));
    return important.length ? important : tokens;
  }
  function subjectText(item) {
    const text = [item.code, item.subject, areaOf(item)].join(' ');
    return norm(/artificial intelligence/i.test(item.subject || '') ? text + ' ai' : text);
  }
  function primaryText(item) { return norm([item.code, item.subject, areaOf(item), item.prerequisites, item['syllabus-link-document']].join(' ')); }
  function allText(item) { return norm(collect(item)); }
  function matchesSearch(item) {
    const tokens = queryTokens();
    if (!tokens.length) return true;
    const primary = primaryText(item);
    const all = allText(item);
    return tokens.every(t => primary.includes(t) || all.includes(t));
  }
  function score(item) {
    const raw = norm(el.search.value);
    const tokens = queryTokens();
    if (!raw && !tokens.length) return 0;
    const subj = subjectText(item), primary = primaryText(item), all = allText(item);
    let s = 0;
    if (subj === raw) s += 1000;
    if (subj.includes(raw)) s += 650;
    if (primary.includes(raw)) s += 350;
    if (all.includes(raw)) s += 120;
    tokens.forEach(t => {
      if (subj.split(' ').includes(t)) s += 140; else if (subj.includes(t)) s += 95;
      if (primary.split(' ').includes(t)) s += 45; else if (primary.includes(t)) s += 25;
      if (all.includes(t)) s += 5;
    });
    return s;
  }
  function currentList() {
    return checklist.filter(item => {
      if (el.status.value !== 'all' && statusOf(item) !== el.status.value) return false;
      if (el.area.value !== 'all' && areaOf(item) !== el.area.value) return false;
      return matchesSearch(item);
    }).sort((a,b) => score(b) - score(a));
  }
  function applyTheme() {
    const dark = localStorage.getItem(themeKey) === 'dark';
    document.body.classList.toggle('dark', dark);
    el.theme.setAttribute('aria-pressed', dark ? 'true' : 'false');
    el.theme.querySelector('.theme-label').textContent = dark ? 'Light mode' : 'Dark mode';
  }
  function initAreas() {
    const areas = unique(checklist.map(areaOf));
    areas.forEach(a => {
      const opt = document.createElement('option'); opt.value = a; opt.textContent = a; el.area.appendChild(opt);
    });
    renderChips();
  }
  function renderChips() {
    const selected = el.area.value;
    el.chips.innerHTML = '';
    unique(checklist.map(areaOf)).forEach(area => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'area-chip' + (selected === area ? ' active' : '');
      btn.dataset.area = area;
      btn.setAttribute('aria-pressed', selected === area ? 'true' : 'false');
      btn.textContent = area;
      el.chips.appendChild(btn);
    });
  }
  function urlFrom(item, keys) {
    for (const key of keys) {
      const value = String(item[key] || '').trim();
      if (/^https?:\/\//i.test(value)) return value;
    }
    return '';
  }
  function syllabusUrl(item) { return urlFrom(item, ['syllabus-url','syllabus-link-document']); }
  function programLabel(item) {
    const raw = (item.program || '').trim();
    if (!raw) return '—';
    return raw;
  }
  function buttonHTML(label, url, title) {
    return url ? `<button type="button" data-open="${esc(url)}">${label}</button>` : `<button type="button" disabled title="${esc(title)}">${label}</button>`;
  }
  function highlight(value) {
    const term = el.search.value.trim();
    const safe = esc(value);
    if (!term) return safe;
    const escaped = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return safe.replace(new RegExp('(' + escaped + ')', 'ig'), '<mark>$1</mark>');
  }
  function weeksHTML(item) {
    const d = item.courseDetail || {};
    const weeks = Array.isArray(d.weeks) ? d.weeks : [];
    if (!weeks.length) return `<div class="weeks" id="weeks-${esc(item.id)}"><div class="small">No 13-week course guide sheet was found for this item.</div></div>`;
    return `<div class="weeks" id="weeks-${esc(item.id)}">${weeks.map(w => `<div class="week"><b>${esc(w.week)}</b><div><strong>${esc(w.formative)}</strong><div class="small">${esc(w.description)}</div></div></div>`).join('')}</div>`;
  }
  function cardHTML(item) {
    const d = item.courseDetail || {};
    const status = statusOf(item);
    const syUrl = syllabusUrl(item);
    const mid = urlFrom(item, ['midterm-url','sample-midterm-url','sample_midterm_url','sample-midterm','sample_midterm','midterm']);
    const fin = urlFrom(item, ['finals-url','sample-finals-url','sample_finals_url','sample-finals','sample_finals','finals','final']);
    return `<article class="card" data-course-id="${esc(item.id)}">
      <div class="course-title">${highlight(item.code)} — ${highlight(item.subject)}</div>
      <div class="meta"><span class="badge area">${esc(areaOf(item))}</span><span class="badge ${status}">${status === 'complete' ? '✓ Complete' : 'Incomplete'}</span><span class="badge term">${esc(item['school-year-term'])} ${esc(item.blank)}</span><span class="badge program-badge">${esc(programLabel(item))}</span></div>
      <div class="small"><strong>Prerequisites:</strong> ${esc(item.prerequisites || d.prerequisites || '—')}</div>
      ${d.description ? `<div class="small" style="margin-top:8px"><strong>Description:</strong> ${esc(d.description)}</div>` : ''}
      <div class="actions"><button type="button" class="primary" data-toggle-weeks="${esc(item.id)}">Open course sheet</button>${buttonHTML('Syllabus Link', syUrl, 'No syllabus link is available')}${buttonHTML('Sample Midterm', mid, 'No sample midterm link is available')}${buttonHTML('Sample Finals', fin, 'No sample finals link is available')}</div>
      <label class="checkrow"><input type="checkbox" data-review="${esc(item.id)}" ${checks[item.id] ? 'checked' : ''}> Mark as reviewed in web checklist</label>
      ${weeksHTML(item)}
    </article>`;
  }
  function renderStats(list) {
    const total = checklist.length;
    const complete = checklist.filter(item => statusOf(item) === 'complete').length;
    const reviewed = Object.values(checks).filter(Boolean).length;
    const pct = total ? Math.round((complete / total) * 100) : 0;
    document.getElementById('totalCourses').textContent = total;
    document.getElementById('completeCourses').textContent = complete;
    document.getElementById('incompleteCourses').textContent = total - complete;
    document.getElementById('reviewedCourses').textContent = reviewed;
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressText').textContent = `${pct}% of syllabi are complete. Showing ${list.length} course${list.length === 1 ? '' : 's'}.`;
  }

  function renderFlowchart() {
    showingFlowchart = true;
    el.flowchart.textContent = 'Show Course Cards';
    el.cards.innerHTML = `
      <article class="card flowchart-card">
        <div class="flowchart-toolbar">
          <div>
            <h2>EMC Curriculum Flowchart</h2>
            <div class="small">Use the zoom controls, then scroll or drag the image to move around.</div>
          </div>
          <div class="zoom-controls" aria-label="Flowchart zoom controls">
            <button type="button" data-zoom-out>−</button>
            <input id="flowchartZoomRange" type="range" min="50" max="250" step="10" value="${Math.round(flowchartZoom * 100)}" aria-label="Flowchart zoom percentage">
            <button type="button" data-zoom-in>+</button>
            <button type="button" data-zoom-reset>Reset</button>
          </div>
        </div>
        <div id="flowchartStage" class="flowchart-stage">
          <img id="flowchartZoomImage" class="flowchart-zoom-image" src="${flowchartImageSrc}" alt="Bachelor of Science in Entertainment and Multimedia Computing curriculum flowchart for AY 2024-2025">
        </div>
      </article>
    `;
    applyFlowchartZoom();
  }
  function applyFlowchartZoom() {
    const img = document.getElementById('flowchartZoomImage');
    const range = document.getElementById('flowchartZoomRange');
    if (img) {
      img.style.transform = `scale(${flowchartZoom})`;
      img.style.marginRight = ((flowchartZoom - 1) * 100) + '%';
      img.style.marginBottom = ((flowchartZoom - 1) * 100) + '%';
    }
    if (range) range.value = Math.round(flowchartZoom * 100);
  }
  function setFlowchartZoom(next) {
    flowchartZoom = Math.max(0.5, Math.min(2.5, next));
    applyFlowchartZoom();
  }
  function showCourseCards() {
    showingFlowchart = false;
    el.flowchart.textContent = 'Show Flowchart';
    render();
  }

  function render() {
    showingFlowchart = false;
    el.flowchart.textContent = 'Show Flowchart';
    const list = currentList();
    el.cards.innerHTML = list.length ? list.map(cardHTML).join('') : '<div class="card empty">No matching courses found.</div>';
    renderStats(list);
    renderChips();
  }

  el.chips.addEventListener('click', event => {
    const btn = event.target.closest('button.area-chip');
    if (!btn) return;
    const selectedArea = btn.dataset.area;
    el.area.value = el.area.value === selectedArea ? 'all' : selectedArea;
    render();
  });
  el.cards.addEventListener('click', event => {
    if (event.target.closest('[data-zoom-in]')) { setFlowchartZoom(flowchartZoom + 0.1); return; }
    if (event.target.closest('[data-zoom-out]')) { setFlowchartZoom(flowchartZoom - 0.1); return; }
    if (event.target.closest('[data-zoom-reset]')) { setFlowchartZoom(1); return; }
    const toggle = event.target.closest('[data-toggle-weeks]');
    if (toggle) {
      const box = document.getElementById('weeks-' + toggle.dataset.toggleWeeks);
      if (box) box.classList.toggle('open');
      return;
    }
    const openBtn = event.target.closest('[data-open]');
    if (openBtn) window.open(openBtn.dataset.open, '_blank', 'noopener');
  });
  el.cards.addEventListener('change', event => {
    const input = event.target.closest('input[data-review]');
    if (!input) return;
    checks[input.dataset.review] = input.checked;
    localStorage.setItem(savedKey, JSON.stringify(checks));
    renderStats(currentList());
  });
  el.cards.addEventListener('input', event => {
    const range = event.target.closest('#flowchartZoomRange');
    if (range) setFlowchartZoom(Number(range.value) / 100);
  });
  let dragState = null;
  el.cards.addEventListener('pointerdown', event => {
    const stage = event.target.closest('#flowchartStage');
    if (!stage) return;
    dragState = { stage, x: event.clientX, y: event.clientY, left: stage.scrollLeft, top: stage.scrollTop };
    stage.classList.add('dragging');
    stage.setPointerCapture(event.pointerId);
  });
  el.cards.addEventListener('pointermove', event => {
    if (!dragState) return;
    dragState.stage.scrollLeft = dragState.left - (event.clientX - dragState.x);
    dragState.stage.scrollTop = dragState.top - (event.clientY - dragState.y);
  });
  el.cards.addEventListener('pointerup', event => {
    if (!dragState) return;
    dragState.stage.classList.remove('dragging');
    dragState = null;
  });
  el.cards.addEventListener('pointercancel', () => {
    if (dragState) dragState.stage.classList.remove('dragging');
    dragState = null;
  });
  el.theme.addEventListener('click', () => {
    const next = document.body.classList.contains('dark') ? 'light' : 'dark';
    localStorage.setItem(themeKey, next);
    applyTheme();
  });
  el.search.addEventListener('input', render);
  el.status.addEventListener('change', render);
  el.area.addEventListener('change', render);
  el.flowchart.addEventListener('click', () => {
    if (showingFlowchart) showCourseCards();
    else renderFlowchart();
  });

  applyTheme();
  initAreas();
  render();
})();
</script>
</body>
</html>
